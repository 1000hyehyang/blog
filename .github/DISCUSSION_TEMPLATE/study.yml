body:
  - type: markdown
    attributes:
      value: |
        📚 **Study** 카테고리 · Category를 **Study**로 선택했는지 확인하세요.

        **frontmatter 안내**
        - `slug` — SEO용 짧은 이름 (비우면 제목에서 자동 생성)
        - `excerpt` — 카드·검색용 요약 (비우면 본문에서 자동 생성)
        - `coverImage` — 대표 이미지 URL, `https://` 필수 (비우면 기본 이미지)
        - `featured` — `true`면 홈 Featured 후보
        - `featuredOrder` — 고정글 순서, 작을수록 앞 (1 → 2 → 3)
        - `published` — `true`면 블로그 공개, `false`면 숨김
        - `tags` — 검색용 키워드 (카테고리와 별개)

        보통은 `published: true`만 확인하고 frontmatter 아래에 본문을 작성하면 됩니다.
  - type: textarea
    id: post-body
    attributes:
      label: 게시글 본문
      description: frontmatter 아래에 본문을 작성하세요
      value: |
        ---
        slug:
        excerpt:
        coverImage:
        featured: false
        featuredOrder: 1
        published: true
        tags:
          - Study
        ---

    validations:
      required: true
