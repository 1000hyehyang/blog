body:
  - type: markdown
    attributes:
      value: |
        **Development** 카테고리 블로그 게시글입니다.
        - `published: true` 확인
        - `featured: true`면 홈 Pinned Posts 후보
        - slug / excerpt / coverImage는 필요할 때만 수정
  - type: textarea
    id: post-body
    attributes:
      label: 게시글 본문
      description: frontmatter와 Markdown 본문을 작성하세요.
      value: |
        ---
        slug:
        excerpt:
        coverImage:
        featured: false
        featuredOrder: 1
        published: true
        tags:
          - Development
        ---

        ## 제목

        본문을 작성하세요.
    validations:
      required: true
