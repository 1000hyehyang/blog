name: Revalidate blog

on:
  workflow_dispatch:
  discussion:
    types:
      - created
      - edited
      - deleted

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Invalidate blog cache
        env:
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          REVALIDATE_URL="$(printf '%s' "$REVALIDATE_URL" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          REVALIDATE_SECRET="$(printf '%s' "$REVALIDATE_SECRET" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$REVALIDATE_URL" ] || [ -z "$REVALIDATE_SECRET" ]; then
            echo "REVALIDATE_URL 또는 REVALIDATE_SECRET secret이 설정되지 않았습니다."
            exit 1
          fi

          DISCUSSION_NUMBER="${{ github.event.discussion.number }}"
          if [ -n "$DISCUSSION_NUMBER" ] && [ "$DISCUSSION_NUMBER" != "null" ]; then
            PAYLOAD="{\"number\": $DISCUSSION_NUMBER}"
          else
            PAYLOAD="{}"
          fi

          response="$(curl -sS -w $'\n%{http_code}' -X POST "$REVALIDATE_URL" \
            -H "Authorization: Bearer $REVALIDATE_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")"
          body="${response%$'\n'*}"
          status="${response##*$'\n'}"

          if [ "$status" != "200" ]; then
            echo "revalidate 실패: HTTP $status"
            echo "$body"
            exit 1
          fi

          echo "$body"
